<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Home: Moment Coffee</title> 

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f1eb;
        }

        header {
            background-color: #3e2723;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #5d4037;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .hero {
            text-align: center;
            padding: 60px 20px;
        }

        .hero h1 {
            font-size: 40px;
            color: #3e2723;
        }

        .hero p {
            font-size: 18px;
            color: #5d4037;
        }

        .btn {
            background-color: #6d4c41;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .btn:hover {
            background-color: #4e342e;
        }

        footer {
            background-color: #3e2723;
            color: white;

            padding: 10px;
            margin-top: 40px;
        }

<body>

    <header>
        <h2>☕ Moment Coffee</h2>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">Menu</a>

        <a href="#">Contact</a>
    </nav>

    <section class="hero">

        <br>
        <button class="btn" onclick="alert('Welcome to Moment Coffee!')">
